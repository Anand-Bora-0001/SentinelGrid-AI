name: ❓ Question
description: Ask a question about HoneyCloud-X
title: "[QUESTION] "
labels: ["question", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for your question! Please provide as much context as possible to help us give you the best answer.

  - type: textarea
    id: question
    attributes:
      label: ❓ Your Question
      description: What would you like to know?
      placeholder: Ask your question here...
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: 📂 Question Category
      description: What category does your question fall into?
      options:
        - Installation/Setup
        - Configuration
        - Usage/How-to
        - Attack Simulation
        - Dashboard/Frontend
        - API/Backend
        - Machine Learning/AI
        - Docker/Deployment
        - Kubernetes
        - Security
        - Performance
        - Troubleshooting
        - Integration
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 🔍 Context
      description: Provide any relevant context or background information
      placeholder: |
        - What are you trying to achieve?
        - What have you already tried?
        - Any relevant configuration or setup details?

  - type: textarea
    id: environment
    attributes:
      label: 🖥️ Environment (if relevant)
      description: Your environment details
      placeholder: |
        - OS: [e.g. Ubuntu 20.04, Windows 10, macOS 12]
        - Python Version: [e.g. 3.11.0]
        - Docker Version: [e.g. 20.10.17]
        - HoneyCloud Version: [e.g. v1.0.0]

  - type: textarea
    id: additional
    attributes:
      label: 📝 Additional Information
      description: Any other information that might be helpful
      placeholder: Screenshots, logs, error messages, etc.

  - type: checkboxes
    id: checklist
    attributes:
      label: ✅ Checklist
      description: Please confirm you've done the following
      options:
        - label: I've searched existing issues and discussions
        - label: I've checked the documentation
        - label: I've provided sufficient context for my question