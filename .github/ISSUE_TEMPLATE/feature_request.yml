name: ✨ Feature Request
description: Suggest a new feature or enhancement for HoneyCloud-X
title: "[FEATURE] "
labels: ["enhancement", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please provide as much detail as possible to help us understand your request.

  - type: textarea
    id: summary
    attributes:
      label: ✨ Feature Summary
      description: A clear and concise description of the feature you'd like to see.
      placeholder: Briefly describe the feature...
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 🎯 Problem Statement
      description: What problem does this feature solve? What use case does it address?
      placeholder: |
        Is your feature request related to a problem? Please describe.
        A clear and concise description of what the problem is.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 💡 Proposed Solution
      description: Describe the solution you'd like to see implemented.
      placeholder: A clear and concise description of what you want to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 🔄 Alternatives Considered
      description: Describe any alternative solutions or features you've considered.
      placeholder: A clear and concise description of any alternative solutions or features you've considered.

  - type: dropdown
    id: component
    attributes:
      label: 🏗️ Component
      description: Which component would this feature affect?
      options:
        - Backend API
        - Frontend Dashboard
        - Attack Simulation
        - Machine Learning/AI
        - Database
        - Alerting System
        - Reporting
        - Docker/Deployment
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 📈 Priority
      description: How important is this feature to you?
      options:
        - Critical (Blocking current work)
        - High (Important for workflow)
        - Medium (Would be nice to have)
        - Low (Minor improvement)
    validations:
      required: true

  - type: checkboxes
    id: feature_type
    attributes:
      label: 🎨 Feature Type
      description: What type of feature is this? (Select all that apply)
      options:
        - label: New functionality
        - label: Performance improvement
        - label: User experience enhancement
        - label: Security enhancement
        - label: API enhancement
        - label: Dashboard improvement
        - label: Integration with external service
        - label: Developer experience improvement

  - type: textarea
    id: mockups
    attributes:
      label: 🎨 Mockups/Wireframes
      description: If applicable, add mockups, wireframes, or screenshots to help explain your feature.
      placeholder: Drag and drop images here...

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: ✅ Acceptance Criteria
      description: What criteria must be met for this feature to be considered complete?
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
        - [ ] Criterion 3

  - type: textarea
    id: additional
    attributes:
      label: 📝 Additional Context
      description: Add any other context, links, or references about the feature request here.
      placeholder: Any additional information...

  - type: checkboxes
    id: contribution
    attributes:
      label: 🤝 Contribution
      description: Are you willing to contribute to this feature?
      options:
        - label: I'm willing to implement this feature
        - label: I can help with testing
        - label: I can help with documentation
        - label: I can provide feedback during development